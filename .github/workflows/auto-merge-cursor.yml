name: Auto-merge cursor agent PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  check_suite:
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: automerge-cursor-prs
  cancel-in-progress: false

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Find open cursor PR for this event
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let pr = context.payload.pull_request;

            if (!pr && context.payload.check_suite) {
              const sha = context.payload.check_suite.head_sha;
              const { data } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner, repo, commit_sha: sha
              });
              pr = data.find(p =>
                p.state === 'open' &&
                p.head.ref.startsWith('cursor/')
              );
            }

            if (!pr) {
              core.setOutput('skip', 'true');
              return;
            }

            core.setOutput('skip', 'false');
            core.setOutput('number', String(pr.number));
            core.setOutput('draft', String(!!pr.draft));
            core.setOutput('sha', pr.head.sha);

      - name: Exit if not a cursor PR
        if: steps.pr.outputs.skip == 'true'
        run: echo "No cursor/* PR to process."

      - name: Mark draft PR ready for review
        if: steps.pr.outputs.skip == 'false' && steps.pr.outputs.draft == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNum = Number('${{ steps.pr.outputs.number }}');

            async function markDraftReady(prNum) {
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
              if (!pr.draft) return;
              // REST pulls.update({ draft: false }) is ignored by GitHub; use GraphQL.
              await github.graphql(
                `mutation($id: ID!) {
                  markPullRequestAsReadyForReview(input: { pullRequestId: $id }) {
                    pullRequest { number isDraft }
                  }
                }`,
                { id: pr.node_id }
              );
            }

            await markDraftReady(prNum);
            for (let i = 0; i < 15; i++) {
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
              if (!pr.draft) {
                core.info(`PR #${prNum} is ready for review.`);
                return;
              }
              core.info(`Waiting for PR #${prNum} to leave draft… (${i + 1}/15)`);
              await new Promise(r => setTimeout(r, 2000));
            }
            core.setFailed(`PR #${prNum} is still a draft after ready request.`);
            return;

      - name: Wait for Cloudflare Pages and merge
        if: steps.pr.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNum = Number('${{ steps.pr.outputs.number }}');
            const requiredCheck = 'Cloudflare Pages';

            async function markDraftReady(prNum) {
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
              if (!pr.draft) return;
              await github.graphql(
                `mutation($id: ID!) {
                  markPullRequestAsReadyForReview(input: { pullRequestId: $id }) {
                    pullRequest { number isDraft }
                  }
                }`,
                { id: pr.node_id }
              );
            }

            let { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
            if (pr.draft) {
              await markDraftReady(prNum);
              for (let i = 0; i < 15; i++) {
                ({ data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNum }));
                if (!pr.draft) break;
                core.info(`Waiting for PR #${prNum} to leave draft… (${i + 1}/15)`);
                await new Promise(r => setTimeout(r, 2000));
              }
              if (pr.draft) {
                core.setFailed(`PR #${prNum} is still a draft; cannot merge.`);
                return;
              }
              core.info(`PR #${prNum} marked ready for review.`);
            }

            for (let attempt = 0; attempt < 30; attempt++) {
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
              if (pr.merged) {
                core.info('PR already merged.');
                return;
              }
              if (!pr.mergeable && pr.mergeable_state === 'dirty') {
                core.setFailed('PR has merge conflicts.');
                return;
              }

              const { data: checks } = await github.rest.checks.listForRef({
                owner, repo, ref: pr.head.sha
              });
              const cf = checks.check_runs.find(c => c.name === requiredCheck);

              if (cf?.status === 'completed' && cf.conclusion === 'success') {
                try {
                  await github.rest.pulls.merge({
                    owner, repo, pull_number: prNum, merge_method: 'squash'
                  });
                  core.info(`Merged PR #${prNum}.`);
                } catch (e) {
                  const msg = e?.message || String(e);
                  const benign405 = /already merged|merge already in progress|still a draft/i.test(msg);
                  if (benign405) {
                    for (let i = 0; i < 15; i++) {
                      const { data: prAfter } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
                      if (prAfter.merged) {
                        core.info(`PR #${prNum} merged by parallel automerge run.`);
                        return;
                      }
                      core.info(`Waiting for PR #${prNum} merge to finish… (${i + 1}/15)`);
                      await new Promise(r => setTimeout(r, 2000));
                    }
                  }
                  const { data: prFinal } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
                  if (prFinal.merged) {
                    core.info(`PR #${prNum} merged by parallel automerge run.`);
                  } else {
                    core.setFailed(`Merge failed: ${msg}`);
                  }
                }
                return;
              }
              if (cf?.status === 'completed' && cf.conclusion === 'failure') {
                core.setFailed('Cloudflare Pages check failed.');
                return;
              }

              core.info(`Waiting for ${requiredCheck}… (${attempt + 1}/30)`);
              await new Promise(r => setTimeout(r, 20000));
            }
            core.setFailed('Timed out waiting for Cloudflare Pages.');
