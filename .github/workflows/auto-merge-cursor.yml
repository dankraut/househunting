name: Auto-merge cursor agent PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  check_suite:
    types: [completed]
  schedule:
    # Safety sweep: promote stuck draft cursor/* PRs after Cloudflare Pages passes
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional PR number to promote/merge (manual recovery)'
        required: false

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: automerge-cursor-prs
  cancel-in-progress: false

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Promote draft cursor PRs and merge when Cloudflare Pages passes
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const requiredCheck = 'Cloudflare Pages';
            const manualPr = '${{ github.event.inputs.pr_number }}'.trim();

            async function listOpenCursorPrs() {
              const out = [];
              for (let page = 1; page <= 5; page++) {
                const { data } = await github.rest.pulls.list({
                  owner, repo, state: 'open', per_page: 100, page,
                });
                if (!data.length) break;
                out.push(...data.filter(p => p.head.ref.startsWith('cursor/')));
                if (data.length < 100) break;
              }
              return out;
            }

            async function findPrsToProcess() {
              if (manualPr) {
                const n = Number(manualPr);
                if (!Number.isFinite(n) || n <= 0) {
                  core.setFailed(`Invalid pr_number: ${manualPr}`);
                  return [];
                }
                return [n];
              }

              let pr = context.payload.pull_request;
              if (pr?.head?.ref?.startsWith('cursor/')) {
                return [pr.number];
              }

              if (context.payload.check_suite) {
                const sha = context.payload.check_suite.head_sha;
                const { data } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner, repo, commit_sha: sha,
                });
                const hit = data.find(p => p.state === 'open' && p.head.ref.startsWith('cursor/'));
                if (hit) return [hit.number];
              }

              if (context.eventName === 'schedule') {
                const open = await listOpenCursorPrs();
                const stuck = [];
                for (const pr of open) {
                  if (pr.draft) {
                    stuck.push(pr.number);
                    continue;
                  }
                  const { data: checks } = await github.rest.checks.listForRef({
                    owner, repo, ref: pr.head.sha,
                  });
                  const cf = checks.check_runs.find(c => c.name === requiredCheck);
                  if (cf?.status === 'completed' && cf.conclusion === 'success') {
                    stuck.push(pr.number);
                  }
                }
                return stuck;
              }

              return [];
            }

            async function ensurePrReady(prNum) {
              let { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
              if (!pr.draft) return pr;

              core.info(`PR #${prNum} is draft — promoting via GraphQL markPullRequestReadyForReview.`);

              // REST PATCH ignores draft:false; undraft requires GraphQL (see GitHub docs).
              const undraftViaGraphql = async () => {
                const { data: fresh } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
                const result = await github.graphql(
                  `mutation($pullRequestId: ID!) {
                    markPullRequestReadyForReview(input: { pullRequestId: $pullRequestId }) {
                      pullRequest { number isDraft }
                    }
                  }`,
                  { pullRequestId: fresh.node_id }
                );
                const out = result?.markPullRequestReadyForReview?.pullRequest;
                if (!out || out.isDraft) {
                  throw new Error(`GraphQL undraft did not clear draft flag for PR #${prNum}`);
                }
                core.info(`PR #${prNum} is ready (GraphQL).`);
                return out;
              };

              for (let attempt = 0; attempt < 3; attempt++) {
                try {
                  await undraftViaGraphql();
                  break;
                } catch (e) {
                  if (attempt === 2) throw new Error(`PR #${prNum} is still a draft after undraft attempts: ${e.message}`);
                  core.warning(`Undraft attempt ${attempt + 1} failed for PR #${prNum}: ${e.message}`);
                  await new Promise(r => setTimeout(r, 2000));
                }
              }

              for (let i = 0; i < 10; i++) {
                ({ data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNum }));
                if (!pr.draft) return pr;
                await new Promise(r => setTimeout(r, 2000));
              }

              throw new Error(`PR #${prNum} is still a draft after undraft attempts`);
            }

            async function waitForCloudflareAndMerge(prNum) {
              for (let attempt = 0; attempt < 30; attempt++) {
                const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
                if (pr.merged) {
                  core.info(`PR #${prNum} already merged.`);
                  return true;
                }
                if (!pr.mergeable && pr.mergeable_state === 'dirty') {
                  core.setFailed(`PR #${prNum} has merge conflicts.`);
                  return false;
                }

                const { data: checks } = await github.rest.checks.listForRef({
                  owner, repo, ref: pr.head.sha,
                });
                const cf = checks.check_runs.find(c => c.name === requiredCheck);

                if (cf?.status === 'completed' && cf.conclusion === 'success') {
                  try {
                    await github.rest.pulls.merge({
                      owner, repo, pull_number: prNum, merge_method: 'squash',
                    });
                    core.info(`Merged PR #${prNum}.`);
                    return true;
                  } catch (e) {
                    const msg = e?.message || String(e);
                    const benign = /already merged|merge already in progress|still a draft/i.test(msg);
                    if (benign) {
                      for (let i = 0; i < 15; i++) {
                        const { data: prAfter } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
                        if (prAfter.merged) {
                          core.info(`PR #${prNum} merged by parallel automerge run.`);
                          return true;
                        }
                        core.info(`Waiting for PR #${prNum} merge to finish… (${i + 1}/15)`);
                        await new Promise(r => setTimeout(r, 2000));
                      }
                    }
                    const { data: prFinal } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
                    if (prFinal.merged) {
                      core.info(`PR #${prNum} merged by parallel automerge run.`);
                      return true;
                    }
                    core.setFailed(`Merge failed for PR #${prNum}: ${msg}`);
                    return false;
                  }
                }

                if (cf?.status === 'completed' && cf.conclusion === 'failure') {
                  core.setFailed(`Cloudflare Pages check failed for PR #${prNum}.`);
                  return false;
                }

                core.info(`PR #${prNum}: waiting for ${requiredCheck}… (${attempt + 1}/30)`);
                await new Promise(r => setTimeout(r, 20000));
              }

              core.setFailed(`Timed out waiting for ${requiredCheck} on PR #${prNum}.`);
              return false;
            }

            async function processPr(prNum) {
              core.info(`Processing cursor PR #${prNum}…`);
              const pr = await ensurePrReady(prNum);
              if (!pr.head.ref.startsWith('cursor/')) {
                core.info(`PR #${prNum} is not cursor/* — skipping.`);
                return;
              }
              await waitForCloudflareAndMerge(prNum);
            }

            const prNumbers = await findPrsToProcess();
            if (!prNumbers.length) {
              core.info('No cursor/* PR to process.');
              return;
            }

            for (const prNum of prNumbers) {
              try {
                await processPr(prNum);
              } catch (e) {
                core.setFailed(`PR #${prNum}: ${e.message}`);
              }
            }
