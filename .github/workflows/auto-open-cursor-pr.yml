name: Auto-open cursor agent PRs

on:
  push:
    branches:
      - 'cursor/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to open PR for (defaults to triggering ref)'
        required: false

env:
  AUTOMERGE_SETTLE_MINUTES: '4'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: open-cursor-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch && format('refs/heads/{0}', github.event.inputs.branch) || github.ref }}

      - name: Rebase onto main (prevents squash-merge follow-up conflicts)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          branch="${GITHUB_REF#refs/heads/}"
          if [[ ! "$branch" =~ ^cursor/ ]] || [[ "$branch" == "main" ]]; then
            echo "Skipping rebase for $branch"
            exit 0
          fi
          git fetch origin main
          if ! git rebase origin/main; then
            echo "::error::Rebase onto origin/main failed. Locally: git fetch origin main && git rebase origin/main && git push --force-with-lease"
            exit 1
          fi
          git push --force-with-lease origin "HEAD:${branch}"

      - name: Open ready PR for cursor branch
        uses: actions/github-script@v7
        env:
          SHIP_TOKEN: ${{ secrets.GH_PAT || secrets.CURSOR_SHIP_TOKEN }}
        with:
          github-token: ${{ secrets.GH_PAT || secrets.CURSOR_SHIP_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = '${{ github.event.inputs.branch }}'.trim()
              || context.ref.replace(/^refs\/heads\//, '');
            const settleMinutes = process.env.AUTOMERGE_SETTLE_MINUTES || '8';

            if (!branch.startsWith('cursor/')) {
              core.info(`Skipping non-cursor branch: ${branch}`);
              return;
            }
            if (branch === 'main') {
              core.info('Skipping main.');
              return;
            }

            async function undraft(prNum) {
              const { data: fresh } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
              if (!fresh.draft) return;
              core.info(`Promoting draft PR #${prNum} to ready.`);
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $pullRequestId }) {
                    pullRequest { number isDraft }
                  }
                }`,
                { pullRequestId: fresh.node_id }
              );
            }

            const { data: compare } = await github.rest.repos.compareCommitsWithBasehead({
              owner, repo, basehead: `main...${branch}`,
            });
            if (!compare.ahead_by) {
              core.info(`Branch ${branch} has no commits ahead of main.`);
              return;
            }

            const { data: existing } = await github.rest.pulls.list({
              owner, repo, state: 'open', head: `${owner}:${branch}`, per_page: 5,
            });
            if (existing.length) {
              const pr = existing[0];
              core.info(`Open PR already exists: ${pr.html_url}`);
              if (pr.draft) await undraft(pr.number);
              if (pr.title.startsWith('Ship cursor/')) {
                const title = compare.commits.length === 1
                  ? compare.commits[compare.commits.length - 1].commit.message.split('\n')[0]
                  : pr.title;
                await github.rest.pulls.update({
                  owner, repo, pull_number: pr.number, title,
                });
              }
              return;
            }

            const { data: closed } = await github.rest.pulls.list({
              owner, repo, state: 'closed', head: `${owner}:${branch}`, per_page: 1,
            });
            if (closed.length && closed[0].merged_at) {
              core.info(
                `Branch ${branch} had merged PR #${closed[0].number}; opening follow-up PR for ${compare.ahead_by} new commit(s).`
              );
            }

            const title = compare.commits.length === 1
              ? compare.commits[compare.commits.length - 1].commit.message.split('\n')[0]
              : `Ship ${branch}`;

            const body = [
              'Opened automatically when a `cursor/*` branch was pushed (Cloud agent ship pipeline).',
              '',
              `- Auto-merge waits **${settleMinutes} minutes** after the latest push, then merges when **Cloudflare Pages** passes (see \`auto-merge-cursor.yml\`).`,
              '- Push all commits before opening the PR when possible; each push resets the settle timer.',
              '- Follow-up pushes are rebased onto `main` automatically to avoid squash-merge conflicts.',
              '- Do not merge or push to `main` manually.',
            ].join('\n');

            try {
              const { data: pr } = await github.rest.pulls.create({
                owner, repo, title, head: branch, base: 'main', body,
              });
              core.info(`Created PR #${pr.number}: ${pr.html_url}`);
              if (pr.draft) await undraft(pr.number);
            } catch (e) {
              const msg = e?.message || String(e);
              if (/not permitted to create or approve pull requests/i.test(msg)) {
                core.warning(
                  'GitHub Actions cannot create PRs until repo setting is enabled: '
                  + `https://github.com/${owner}/${repo}/settings/actions `
                  + '(Workflow permissions → allow Actions to create/approve pull requests). '
                  + 'Or add repo secret GH_PAT with repo scope.'
                );
                core.setFailed(msg);
                return;
              }
              throw e;
            }
